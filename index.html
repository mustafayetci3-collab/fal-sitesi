<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alanya Su Falı - Sena Bacı</title>
    <style>
        body { background: radial-gradient(circle, #001529 0%, #000000 100%); color: #e0f7fa; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: rgba(0, 30, 60, 0.8); padding: 40px; border-radius: 30px; box-shadow: 0 0 50px #00d2ff; max-width: 500px; width: 90%; text-align: center; border: 1px solid #00d2ff; }
        h1 { text-shadow: 2px 2px 10px #00d2ff; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 15px; border: 1px solid #00d2ff; background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; }
        button { background: #00d2ff; color: #001529; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        #sonuc { margin-top: 30px; font-size: 1.2rem; line-height: 1.6; color: #fff; min-height: 50px; }
        .loading { color: #81d4fa; font-style: italic; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="wave" style="font-size: 3rem;">🌊</div>
        <h1>Alanya Su Falı</h1>
        <p>Niyetini suya fısılda gurban olduğum...</p>
        <input type="text" id="soru" placeholder="İçinden geçeni yaz..." autocomplete="off">
        <br>
        <button onclick="falBak()">SENA BACI'YA SOR</button>
        <div id="sonuc"></div>
    </div>

    <script>
        async function falBak() {
            const soruInput = document.getElementById('soru');
            const sonucDiv = document.getElementById('sonuc');
            
            if(!soruInput.value) { alert("Hele bir niyet et gurbanım!"); return; }

            sonucDiv.innerHTML = '<p class="loading">Sena suya bakıyor, dur hele bir durulun...</p>';
            
            try {
                const response = await fetch('/.netlify/functions/fal', {
                    method: 'POST',
                    body: JSON.stringify({ soru: soruInput.value })
                });
                
                const data = await response.json();
                sonucDiv.innerHTML = "<b>Sena Bacı der ki:</b> <br>" + data.cevap;
            } catch (error) {
                sonucDiv.innerHTML = "Sena'nın gözleri yoruldu gurban, biraz sonra gel!";
                console.error(error);
            }
        }
    </script>
</body>
</html>
